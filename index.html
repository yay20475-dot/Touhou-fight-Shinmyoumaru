<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reimu & Marisa & Sakuya vs Shinmyoumaru- Special Bomb Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #050510; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: white; 
            pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        #bomb-btn, #switch-btn {
            position: absolute; border-radius: 50%; border: 2px solid white;
            color: white; font-weight: bold; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #bomb-btn {
            bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: rgba(255, 0, 0, 0.6); box-shadow: 0 0 15px red;
        }
        #switch-btn {
            bottom: 30px; left: 30px; width: 80px; height: 80px;
            background: rgba(0, 255, 100, 0.4); box-shadow: 0 0 15px green;
        }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color: #ff44ff;">TOUHOU FIGHT - SPECIAL BOMB</h1>
        <p> Reimu & Marisa & Sakuya vs Shinmyoumaru</p>
        <div style="margin-top: 20px; padding: 15px; border: 2px solid #fff;">TAP TO START</div>
    </div>

    <div id="ui">
        Boss HP: <span id="hp-val">4250</span><br>
        Char: <span id="char-name" style="color: #44aaff;">REIMU</span><br>
        Bombs: <span id="bomb-val">3</span>
    </div>

    <div id="switch-btn">SWITCH</div>
    <div id="bomb-btn">BOMB</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

const imgReimu = new Image();
const imgMarisa = new Image();
const imgShin = new Image();
const imgSakuya = new Image();

imgReimu.src = "https://i.ibb.co/twm06KF3/image.png";
imgMarisa.src = "https://i.ibb.co/bYzf4KP/image.png";
imgShin.src = "https://i.ibb.co/fYkRjd1J/image.png";
imgSakuya.src = "https://i.ibb.co/bjfQGhQv/image.png";

let timeStop = 0;

        let gameStarted = false, currentPlayer = "reimu", isGameOver = false;

let player = {
    x: canvas.width/2,
    y: canvas.height - 150,
    r: 1,
    visualR: 15,
    bombs: 3,
    invuln: 0
};

        let boss = { x: canvas.width/2, y: 150, hp: 4250, maxHp: 4250, r: 35 };
        let enemyBullets = [], playerBullets = [], lasers = [], bombEffects = [];
        let bombTimer = 0, shake = 0, frame = 0;

function getHitbox() {
    return currentPlayer === "reimu" ? 0.5 : 1;
}

        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;
            }
            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)
    ctx.fillRect(-10, -10, 4, 20);

    // ✨ lõi sáng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // 🌟 glow xanh nhẹ
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }
            draw() {
    if (!this.active) return;

    let w = 90;
    let h = 22;

    ctx.save();
    ctx.translate(this.currentX, this.targetY);

    // thân tàu
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(-w/2, -h/2, w, h);

    // đầu tàu
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(w/2, 0);
    ctx.lineTo(w/2 + 40, -18);
    ctx.lineTo(w/2 + 40, 18);
    ctx.closePath();
    ctx.fill();

    // cửa sổ
    ctx.fillStyle = "white";
    for (let i = -30; i <= 30; i += 15) {
        ctx.fillRect(i, -3, 5, 6);
    }

    ctx.restore();
}
}
        lasers = [new Laser()];

        document.getElementById("start-overlay").addEventListener("touchstart", () => {
            gameStarted = true; document.getElementById("start-overlay").style.display = "none"; requestAnimationFrame(draw);
        }, { once: true });

let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    e.preventDefault();

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    // 👆 lượng vuốt
    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình
    player.x = Math.max(10, Math.min(canvas.width - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

}, { passive: false });

window.addEventListener("touchend", () => {

    lastTouchX = null;
    lastTouchY = null;

});

document.getElementById("switch-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (isGameOver) return;

   if (currentPlayer === "reimu") currentPlayer = "marisa";
else if (currentPlayer === "marisa") currentPlayer = "sakuya";
else currentPlayer = "reimu";

    document.getElementById("char-name").innerText = currentPlayer.toUpperCase();
    document.getElementById("char-name").style.color =
    (currentPlayer === "reimu") ? "#44aaff" :
    (currentPlayer === "marisa") ? "#ffff00" :
    "#cccccc";
});

        document.getElementById("bomb-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (player.bombs > 0 && !isGameOver && bombTimer === 0) {
                player.bombs--; document.getElementById("bomb-val").innerText = player.bombs;
                bombTimer = 120; shake = 10; player.invuln = 150;
                if (currentPlayer === "reimu") { // Fantasy Seal
                    for (let i = 0; i < 7; i++) {
                        bombEffects.push(new Bullet(player.x, player.y, (i * Math.PI * 2 / 7), 5, "#ff0088", 12, 60, true));
                    }
                }

if (currentPlayer === "sakuya") {
    timeStop = 120;

    // 💥 bắn dao mọi hướng
    for (let i = 0; i < 40; i++) {
        let angle = (i / 40) * Math.PI * 2;

        playerBullets.push(
            new Bullet(
                player.x,
                player.y,
                angle,
                10,
                "#3399ff",
                3,
                15,
                true // 👈 QUAN TRỌNG: homing để hiện dao
            )
        );
    }
}

                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

function spawnDanmaku() {

    if (timeStop > 0) return;

    frame++;

    if (boss.hp <= 1000) {

        // luôn nằm trong vùng pattern 5
        cycle = 1700;

    } else {

        // bình thường chạy pattern 1-4
        cycle = frame % 1600;
    }

    if (timeStop <= 0) {
        boss.x =
            (canvas.width / 2) +
            Math.sin(frame * 0.01) *
            (canvas.width / 4);
    }

    if (bombTimer > 0) {
        enemyBullets = [];
        return;
    }

if (cycle < 400) {

    let spin = frame * 0.12;

    let spawnRate = 6;

    if (player.y < canvas.height / 2) {
        spawnRate = 3;
    }

    if (frame % spawnRate === 0) {

        // 🔥 GIỮ NGUYÊN pattern xoáy
        if (Math.random() < 0.5) {
            spin += (Math.random() - 0.5) * Math.PI * 1.8;
        }

        spin += Math.sin(frame * 0.2) * 0.8;

        for (let i = 0; i < 30; i++) {

            let t = i / 30;

            let angle = spin + t * Math.PI * 2;

            let sx = boss.x;
            let sy = boss.y;

            // 👉 chỉ lọc nửa dưới boss
            let dx = Math.cos(angle) * 60;
            let dy = Math.sin(angle) * 60;

            let px = sx + dx;
            let py = sy + dy;

            if (py < boss.y) continue;

            enemyBullets.push(
                new Bullet(
                    px,
                    py,
                    angle,
                    2.6,
                    "#ffffff",
                    3
                )
            );
        }

        // 🔥 BONUS: chỉ khi player ở nửa trên boss
        if (player.y < boss.y) {

            let angToPlayer = Math.atan2(
                player.y - boss.y,
                player.x - boss.x
            );

            for (let i = 0; i < 100; i++) {

                let spread = (Math.random() - 0.5) * 3;

                enemyBullets.push(
                    new Bullet(
                        boss.x,
                        boss.y,
                        angToPlayer + spread,
                        10,
                        "orange",
                        4
                    )
                );
            }
        }
    }
} else if (cycle < 800) {

    // 🫧 đạn vô hình gần player sẽ phình to
    if (frame % 30 === 0) {

        for (let i = 0; i < 8; i++) {

            let angle =
                (Math.PI * 2 / 10) * i +
                frame * 0.01;

            let b = new Bullet(
                boss.x,
                boss.y,
                angle,
                2.2,
                "rgba(255,255,255,0.08)",
                6
            );

            // size gốc
            b.baseRadius = 6;

            // update riêng
            b.update = function() {

                this.x += this.vx;
                this.y += this.vy;

                let dist = Math.hypot(
                    player.x - this.x,
                    player.y - this.y
                );

                // 👁️ càng gần càng to
                if (dist < 260) {

                    this.radius =
                        this.baseRadius +
                        (260 - dist) * 0.12;

                } else {

                    this.radius =
                        this.baseRadius;
                }

                // giới hạn max
                if (this.radius > 45) {
                    this.radius = 45;
                }
            };

            // draw glow
            b.draw = function() {

                ctx.save();

                let alpha =
                    Math.min(
                        0.9,
                        this.radius / 40
                    );

                ctx.fillStyle =
                    "rgba(255,120,255," +
                    alpha + ")";

                ctx.shadowColor = "#ff88ff";
                ctx.shadowBlur =
                    this.radius;

                ctx.beginPath();

                ctx.arc(
                    this.x,
                    this.y,
                    this.radius,
                    0,
                    Math.PI * 2
                );

                ctx.fill();

                ctx.restore();
            };

            enemyBullets.push(b);
        }
}
    if (frame % 60 === 0) {

        for (let i = 0; i < 6; i++) {

            let angle =
                (Math.PI * 2 / 6) * i;

            let big = new Bullet(
                boss.x,
                boss.y,
                angle,
                1.8,
                "#ff66ff",
                18
            );

            enemyBullets.push(big);
        }
    }

}else if (cycle < 1200) {

    // 💀 ellipse quanh Sukuna rồi bay ra ngoài

    if(frame % 8 === 0){

        for(let i = 0; i < 12; i++){

            let t = (i / 12) * Math.PI * 2;

            // vị trí ellipse
            let a = 80;
            let c = 35;

            let ex = Math.cos(t) * a;
            let ey = Math.sin(t) * c;

            // xoay ellipse
            let rot = frame * 0.04;

            let rx =
                ex * Math.cos(rot) -
                ey * Math.sin(rot);

            let ry =
                ex * Math.sin(rot) +
                ey * Math.cos(rot);

            // vị trí spawn
            let sx = boss.x + rx;
            let sy = boss.y + ry;

            // 💀 hướng đối diện Sukuna
            let ang = Math.atan2(
                sy - boss.y,
                sx - boss.x
            );

let b = new Bullet(
                    sx,
                    sy,
                    ang,
                    4,
                    "#3399ff",
                    4
            );

b.draw = function () {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // thân dao
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // mũi dao
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // chuôi
    ctx.fillRect(-10, -10, 4, 20);

    // lõi trắng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // glow
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();
};

enemyBullets.push(b);

        }
    }
}

// 🔵 PATTERN - Shinmyoumaru growing spiral
else if (cycle < 1600) {

    if(frame % 8 === 0){

for(let side = 0; side < 2; side++){

    for(let j = -1; j <= 1; j++){

        let ang =
        frame * 0.04 *
        (side === 0 ? 1 : -1);

        ang += j * 0.15;

        let b =
        new Bullet(
            boss.x,
            boss.y,
            ang,
            5,
            "#3399ff",
            9,
            1
        );

        b.life = 0;

        b.update = function(){

            this.life++;

            this.x += this.vx;
            this.y += this.vy;

            if(this.radius < 40){

                this.radius += 0.2;
            }
        };

        enemyBullets.push(b);
    }
}
}
}

else if (boss.hp <= 1000) {

    player.visualR = 45;

getHitbox = function () {
    return currentPlayer === "reimu" ? 15 : 20;
};

    if(frame % 15 === 0){
        for(let i = 0; i < 8; i++){
            let ang =
                (Math.PI * 2 / 8) * i +
                frame * 0.02;

            enemyBullets.push(new Bullet(
                boss.x,
                boss.y,
                ang,
                4,
                "#ff66ff",
                12
            ));
        }
    }
    if (frame % 10 === 0) {
        enemyBullets.push(new Bullet(
            boss.x,
            boss.y,
            Math.random() * Math.PI * 2,
            3,
            "#cc00ff",
            5
        ));
    }
}

if (currentPlayer === "reimu" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x - 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
    playerBullets.push(new Bullet(player.x + 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
} 

else if (currentPlayer === "marisa" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x, player.y, -Math.PI/2, 10, "#ffff00", 8, 6));
}

else if (currentPlayer === "sakuya" && frame % 10 === 0) {
    playerBullets.push(
        new Bullet(player.x, player.y, -Math.PI/2, 14, "#3399ff", 3, 10, true) // 👈 bật homing
    );
}

        }

        function update() {

if (timeStop > 0) {
    timeStop--;
}

            if (isGameOver || boss.hp <= 0 || !gameStarted) return;
            if (player.invuln > 0) player.invuln--;
            if (shake > 0) shake *= 0.9;
            if (bombTimer > 0) {
                bombTimer--;
                if (currentPlayer === "marisa") { boss.hp -= 5; shake = 5; } // Master Spark liên tục gây dam
            }
            spawnDanmaku();

lasers.forEach(l => {

});

            enemyBullets.forEach((b, i) => {
    if (timeStop <= 0) b.update();

if (player.invuln === 0 && Math.hypot(b.x - player.x, b.y - player.y) < getHitbox() + b.radius) {
    isGameOver = true;
    alert("GAME OVER");
}

                if (b.y > canvas.height || b.y < 0 || b.x > canvas.width || b.x < 0) enemyBullets.splice(i, 1);
            });

            bombEffects.forEach((orb, i) => {
                orb.update();
                if (Math.hypot(orb.x - boss.x, orb.y - boss.y) < boss.r + orb.radius) { boss.hp -= orb.damage; bombEffects.splice(i, 1); }
            });

            playerBullets.forEach((pb, i) => {
                pb.update();
                if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < boss.r) { boss.hp -= pb.damage; playerBullets.splice(i, 1); }
                if (pb.y < 0) playerBullets.splice(i, 1);
            });
            document.getElementById("hp-val").innerText = Math.max(0, Math.floor(boss.hp));
            if (boss.hp <= 0) { alert("VICTORY!"); }
        }

        function draw() {
            if (!gameStarted) return;
            ctx.save(); ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);
            if (timeStop > 0) {
    ctx.fillStyle = "rgba(200, 200, 255, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
            // HP Bar
            ctx.fillStyle = "#333"; ctx.fillRect(50, 40, canvas.width - 100, 8);
            ctx.fillStyle = (boss.hp < 1000) ? "red" : "#ff00ff"; ctx.fillRect(50, 40, (canvas.width - 100) * (boss.hp / boss.maxHp), 8);

let cycle = frame % 1600;

if (cycle >= 1200 && cycle < 1600 && bombTimer === 0) {
    if (timeStop <= 0) {
        lasers.forEach(l => l.draw());
    }
}

            // Master Spark (Marisa)
            if (bombTimer > 0 && currentPlayer === "marisa") {
                let sparkW = Math.sin(bombTimer * 0.1) * 20 + 120;
                let gradient = ctx.createLinearGradient(player.x - sparkW/2, 0, player.x + sparkW/2, 0);
                gradient.addColorStop(0, "rgba(255,255,200,0)"); gradient.addColorStop(0.5, "white"); gradient.addColorStop(1, "rgba(255,255,200,0)");
                ctx.fillStyle = gradient; ctx.fillRect(player.x - sparkW/2, 0, sparkW, player.y);
                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

if (typeof imgShin !== 'undefined') {
    ctx.drawImage(imgShin, boss.x - 60, boss.y - 60, 120, 120);
}

let img = (currentPlayer === "reimu") ? imgReimu :
          (currentPlayer === "marisa") ? imgMarisa :
          imgSakuya;

if (img && img.complete) {

let drawSize =
(boss.hp <= 1000)
? 160
: 40;

ctx.drawImage(
    img,
    player.x - drawSize/2,
    player.y - drawSize/2,
    drawSize,
    drawSize
);

} else {
    // fallback nếu ảnh chưa load
    ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
    ctx.fill();
}

ctx.fillStyle = "lime";

ctx.beginPath();

ctx.arc(
    player.x,
    player.y,
   (boss.hp <= 1000) ? 20 : 3,
    0,
    Math.PI * 2
);

ctx.fill();

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

            
            
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
